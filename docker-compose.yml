version: '3.8'

# RESUMEN
# =================================================================================
# ARQUITECTURA DEL PROYECTO ING-2 (EQUIPO SYNCRO)
# =================================================================================
# 1. FRONTEND (Puerto 5173): React + Vite. 
#    - Interfaz de usuario basada en componentes reutilizables.
# 2. BACKEND (Puerto 8000): PHP 8.4 + Laravel (Apache). 
#    - Cerebro del sistema. Procesa lógica y sirve datos en formato JSON (API).
# 3. BASE DE DATOS (Puerto 3306): MySQL 8.0. 
#    - Almacenamiento relacional persistente. Laravel se conecta vía Eloquent (ORM).
# 4. ADMIN DB (Puerto 8080): phpMyAdmin. 
#    - Herramienta visual para que los devs gestionen tablas sin usar consola.
# =================================================================================
services:
  # Base de Datos (MySQL)
  db:
    image: mysql:8.0
    container_name: syncro_db
    restart: always
    environment:
      MYSQL_DATABASE: proyecto_ing2
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: syncro_user
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # Administrador de Base de Datos (phpMyAdmin)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: syncro_phpmyadmin
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
    depends_on:
      - db

# Backend (PHP/Laravel)
  backend:
    image: php:8.4-apache
    container_name: syncro_backend
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/apache/000-default.conf:/etc/apache2/sites-available/000-default.conf
    environment:
      - DB_HOST=db
      - DB_DATABASE=proyecto_ing2
      - DB_USERNAME=syncro_user
      - DB_PASSWORD=secret
    command: >
      sh -c "
        docker-php-ext-install pdo pdo_mysql &&
        a2enmod rewrite &&
        apache2-foreground
      "
    depends_on:
      - db

  # Frontend (React con Vite)
  frontend:
    image: node:20-alpine
    container_name: syncro_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: >
      sh -c "
        if [ ! -f package.json ]; then
          npx --yes create-vite@latest . --template react &&
          printf \"import { defineConfig } from 'vite'\nimport react from '@vitejs/plugin-react'\n\nexport default defineConfig({\n  plugins: [react()],\n  server: {\n    host: true,\n    port: 5173,\n    watch: {\n      usePolling: true,\n    }\n  }\n})\" > vite.config.js
        fi &&
        npm install &&
        npm run dev -- --host 0.0.0.0
      "

volumes:
  db_data: